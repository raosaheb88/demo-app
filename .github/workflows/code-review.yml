name: EC2 IP Test

on:
  workflow_dispatch:

jobs:
  test-ec2:
    runs-on: ubuntu-latest

    steps:
      - name: Test EC2 Connection
        run: |
          echo "Testing EC2 IP and port..."

          curl -v \
            --connect-timeout 10 \
            --max-time 20 \
            http://13.235.113.136:8080/api/review

          cat > request.json <<EOF
          {
            "repoUrl": "$REPO_URL",
            "prNumber": $PR_NUMBER,
            "jiraId": "$JIRA_ID"
          }
          EOF

          echo "========== REQUEST =========="
          cat request.json

          curl -X POST "http://13.235.113.136:8080/api/review" \
            -H "Content-Type: application/json" \
            -d @request.json \
            -o review-response.json

          echo "========== RESPONSE =========="
          cat review-response.json


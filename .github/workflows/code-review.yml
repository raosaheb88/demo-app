name: Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:
    inputs:
      prNumber:
        description: "PR Number"
        required: true
        default: "1"

jobs:
  review:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Get PR Code Changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            PR_NUMBER="${{ github.event.inputs.prNumber }}"
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "Owner: $OWNER"
          echo "Repo: $REPO"
          echo "PR Number: $PR_NUMBER"

          curl -X GET "http://localhost:8080/api/github/pr/files?owner=$OWNER&repo=$REPO&prNumber=$PR_NUMBER"
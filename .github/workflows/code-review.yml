name: Code Review

on:
pull_request:
types:
  - opened
  - synchronize
  - reopened

jobs:
code-review:
runs-on: self-hosted
  
  ```
steps:
  - name: Trigger Code Review API
    run: |
      curl -X POST http://localhost:8080/api/review \
        -H "Content-Type: application/json" \
        -d '{
          "repoUrl": "${{ github.server_url }}/${{ github.repository }}.git",
          "prNumber": ${{ github.event.pull_request.number }},
          "jiraId": "${{ github.event.pull_request.head.ref }}"
        }'

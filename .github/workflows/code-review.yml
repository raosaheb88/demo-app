name: Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

jobs:
  code-review:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Code Review API
        shell: bash
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
          PR_NUMBER="${{ github.event.pull_request.number || 4 }}"
          JIRA_ID="RD-3"

          cat > request.json <<EOF
          {
            "repoUrl": "$REPO_URL",
            "prNumber": $PR_NUMBER,
            "jiraId": "$JIRA_ID"
          }
          EOF

          echo "Request Payload:"
          cat request.json

          curl -X POST "http://localhost:8080/api/review" \
            -H "Content-Type: application/json" \
            -d @request.json

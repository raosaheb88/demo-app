name: Code Review

on:
  workflow_dispatch:

jobs:
  review:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Code Review
        run: |
          curl -X POST http://localhost:8081/api/review \
            -H "Content-Type: application/json" \
            -d '{
                  "repo":"${{ github.repository }}",
                  "branch":"${{ github.ref_name }}"
                }'